<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Home Setup Board · SLC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  min-height:100vh;
  padding-bottom:100px;
}

/* ══ LIGHT (default) ══ */
:root{
  --bg:#F5F5F7;
  --surface:#FFFFFF;
  --surface2:#F2F2F4;
  --surface3:#E8E8EC;
  --border:#E0E0E6;
  --border2:#C8C8CE;
  --accent:#5856D6;
  --accent2:#7B79E8;
  --accent-bg:rgba(88,86,214,.07);
  --green:#34C759;
  --red:#FF3B30;
  --orange:#FF9500;
  --yellow:#FFCC00;
  --text1:#1C1C1E;
  --text2:#48484A;
  --text3:#8E8E93;
  --header-bg:rgba(245,245,247,.92);
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.05);
  --shadow-lg:0 20px 50px rgba(0,0,0,.13);
  --r:14px;--r-sm:10px;--r-xs:8px;
}

/* ══ DARK ══ */
body.dark{
  --bg:#0F0F12;
  --surface:#1C1C1E;
  --surface2:#2C2C2E;
  --surface3:#3A3A3C;
  --border:#38383A;
  --border2:#48484A;
  --accent:#7B79E8;
  --accent2:#A09EFF;
  --accent-bg:rgba(123,121,232,.13);
  --green:#30D158;
  --red:#FF453A;
  --orange:#FF9F0A;
  --yellow:#FFD60A;
  --text1:#F2F2F7;
  --text2:#AEAEB2;
  --text3:#636366;
  --header-bg:rgba(15,15,18,.93);
  --shadow:0 1px 3px rgba(0,0,0,.25),0 4px 14px rgba(0,0,0,.18);
  --shadow-lg:0 20px 50px rgba(0,0,0,.5);
}

body,body *{
  transition:background-color .3s,border-color .3s,color .3s,box-shadow .3s;
}

/* ══ LAYOUT ══ */
body{background:var(--bg);color:var(--text1)}
.app-wrap{max-width:1060px;margin:0 auto}

/* ══ HEADER ══ */
.header{
  background:var(--header-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100;
  border-bottom:1px solid var(--border);
  padding:15px 20px 13px;
}
.header-inner{max-width:1060px;margin:0 auto}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px;gap:10px}
.header-title{font-size:23px;font-weight:700;letter-spacing:-.4px;color:var(--text1)}
.header-sub{font-size:11px;color:var(--text3);margin-top:2px;font-weight:400}
.header-right{display:flex;align-items:center;gap:7px;flex-shrink:0}

.time-badge{
  font-size:11px;color:var(--text3);font-weight:500;
  background:var(--surface);border:1px solid var(--border);
  border-radius:50px;padding:4px 10px;white-space:nowrap;
}
.theme-btn{
  width:34px;height:34px;border-radius:50%;
  border:1.5px solid var(--border);background:var(--surface);
  cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.theme-btn:active{transform:scale(.88)}
.btn-add-main{
  background:var(--accent);color:#fff;border:none;
  border-radius:50px;padding:9px 15px;
  font-size:13px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:4px;
  font-family:inherit;white-space:nowrap;
  box-shadow:0 3px 10px rgba(88,86,214,.3);
}
.btn-add-main:active{transform:scale(.95);opacity:.85}

/* ══ GRAND TOTAL ══ */
.grand-total{
  background:linear-gradient(135deg,var(--accent) 0%,#3D3BB8 100%);
  border-radius:var(--r-sm);padding:11px 15px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 5px 18px rgba(88,86,214,.25);
}
.gt-label{font-size:10px;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.7px;color:#fff}
.gt-amount{font-size:21px;font-weight:700;letter-spacing:-.4px;color:#fff}
.gt-sub{font-size:11px;opacity:.7;margin-top:1px;color:#fff}

/* ══ FILTER CHIPS ══ */
.filter-bar{
  display:flex;gap:7px;padding:12px 20px 0;
  overflow-x:auto;scrollbar-width:none;
  max-width:1060px;margin:0 auto;
}
.filter-bar::-webkit-scrollbar{display:none}
.cat-chip{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:50px;padding:6px 13px;
  white-space:nowrap;font-size:12px;font-weight:500;
  color:var(--text2);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;gap:4px;
}
.cat-chip.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.cat-chip:active{transform:scale(.94)}

/* ══ MAIN GRID — responsive ══ */
.main{padding:14px 20px}
#catsGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  align-items:start;
}
@media(min-width:680px){
  #catsGrid{grid-template-columns:repeat(2,1fr)}
}

/* ══ CAT CARD ══ */
.cat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:var(--shadow);
  animation:fadeUp .22s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

.cat-header{
  display:flex;align-items:center;gap:11px;
  padding:13px 15px;cursor:pointer;
}
.cat-header:active{background:var(--surface2)}
.cat-icon{
  width:36px;height:36px;border-radius:var(--r-xs);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:15px;font-weight:600;color:var(--text1)}
.cat-meta{font-size:11px;color:var(--text3);margin-top:1px}
.cat-total{font-size:15px;font-weight:700;flex-shrink:0;letter-spacing:-.2px}
.cat-chevron{color:var(--text3);font-size:14px;margin-left:2px;transition:transform .2s;flex-shrink:0}
.cat-chevron.open{transform:rotate(90deg)}

.cat-progress{padding:0 15px 1px}
.prog-bar{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease}
.prog-label{font-size:11px;color:var(--text3);margin-top:3px;padding-bottom:7px}

.cat-body{display:none}
.cat-body.open{display:block}

/* ══ ITEM ══ */
.item-row{
  display:flex;align-items:flex-start;gap:9px;
  padding:10px 15px;border-top:1px solid var(--border);
}
.item-check{
  width:20px;height:20px;border-radius:50%;
  border:2px solid var(--border2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;margin-top:1px;
}
.item-check.done{background:var(--green);border-color:var(--green)}
.item-check.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.item-main{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;color:var(--text1);line-height:1.35}
.item-name.done{text-decoration:line-through;color:var(--text3)}
.item-link-row{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.item-link-badge{
  display:inline-flex;align-items:center;gap:3px;
  background:var(--accent-bg);border:1px solid rgba(88,86,214,.18);
  border-radius:50px;padding:2px 8px;
  font-size:11px;color:var(--accent);text-decoration:none;
  max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
body.dark .item-link-badge{border-color:rgba(160,158,255,.22)}
.item-link-badge:hover{opacity:.7}
.item-thumb{
  width:42px;height:42px;border-radius:var(--r-xs);
  border:1px solid var(--border);flex-shrink:0;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;cursor:pointer;overflow:hidden;
}
.item-thumb img{width:26px;height:26px;object-fit:contain}
.item-price{font-size:13px;font-weight:700;color:var(--text1);white-space:nowrap;letter-spacing:-.2px}
.item-price.done{color:var(--text3);font-weight:400}
.item-actions{display:flex;gap:1px;margin-top:2px}
.item-action-btn{
  width:26px;height:26px;background:none;border:none;
  border-radius:var(--r-xs);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);
}
.item-action-btn:hover{background:var(--surface3);color:var(--text1)}
.item-action-btn.del:hover{color:var(--red)}

.cat-actions{display:flex;border-top:1px solid var(--border)}
.cat-act-btn{
  flex:1;padding:9px 4px;background:none;border:none;
  cursor:pointer;font-size:11px;font-weight:500;color:var(--accent);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:inherit;
}
.cat-act-btn:not(:last-child){border-right:1px solid var(--border)}
.cat-act-btn:active{background:var(--surface2)}
.cat-act-btn span{font-size:14px}
.cat-act-btn.danger{color:var(--red)}
.empty-cat{padding:18px 15px;text-align:center;font-size:13px;color:var(--text3)}

/* ══ MODAL ══ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.38);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .22s;
}
body.dark .modal-overlay{background:rgba(0,0,0,.6)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px 20px 0 0;width:100%;max-width:520px;
  padding:18px 22px 48px;
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.34,1.56,.64,1);
  max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);
}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 17px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:17px;text-align:center;color:var(--text1)}
.form-group{margin-bottom:11px}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.form-input{
  width:100%;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  padding:11px 13px;font-size:15px;color:var(--text1);
  outline:none;font-family:inherit;
}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
.emoji-row{display:flex;flex-wrap:wrap;gap:6px}
.emoji-opt{
  width:37px;height:37px;border-radius:var(--r-xs);
  background:var(--surface2);border:1.5px solid var(--border);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.emoji-opt.selected{border-color:var(--accent);background:var(--accent-bg)}
.color-row{display:flex;gap:9px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent}
.color-swatch.selected{border-color:var(--text1);transform:scale(1.22)}
.btn-create{
  width:100%;background:var(--accent);color:#fff;border:none;
  border-radius:var(--r-sm);padding:14px;
  font-size:15px;font-weight:600;cursor:pointer;margin-top:15px;
  font-family:inherit;box-shadow:0 4px 12px rgba(88,86,214,.22);
}
.btn-create:active{transform:scale(.98);opacity:.85}
#urlPreview{margin-top:7px;display:none}
#urlPreviewCard{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-xs);padding:9px 12px;
  display:flex;align-items:center;gap:9px;
}
#urlPreviewImg{
  width:34px;height:34px;border-radius:6px;
  background:var(--surface3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;overflow:hidden;
}
#urlPreviewHost{font-size:12px;font-weight:600;color:var(--text1)}
#urlPreviewShort{font-size:11px;color:var(--accent);margin-top:1px}

/* ══ CONFIRM ══ */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  z-index:300;display:flex;align-items:center;justify-content:center;
  padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;
}
.confirm-overlay.open{opacity:1;pointer-events:all}
.confirm-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:22px;max-width:270px;width:100%;
  text-align:center;transform:scale(.87);
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);
  box-shadow:var(--shadow-lg);
}
.confirm-overlay.open .confirm-card{transform:scale(1)}
.confirm-card h3{font-size:16px;font-weight:700;margin-bottom:7px;color:var(--text1)}
.confirm-card p{font-size:13px;color:var(--text3);margin-bottom:17px;line-height:1.5}
.confirm-btns{display:flex;gap:9px}
.conf-btn{flex:1;padding:11px;border:none;border-radius:var(--r-xs);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.conf-btn.cancel{background:var(--surface3);color:var(--text2)}
.conf-btn.del{background:var(--red);color:#fff}

/* ══ SUMMARY ══ */
.summary-view{padding:14px 20px;display:none}
.summary-view.active{display:block}
.sum-grid{display:grid;grid-template-columns:1fr;gap:12px;max-width:1060px;margin:0 auto}
@media(min-width:680px){.sum-grid{grid-template-columns:1fr 1fr}}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;box-shadow:var(--shadow)}
.sum-card h3{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:11px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.sum-row:last-child{border-bottom:none}
.sum-label{font-size:14px;color:var(--text2)}
.sum-val{font-size:14px;font-weight:700;color:var(--text1)}
.sum-val.g{color:var(--green)}
.sum-val.a{color:var(--accent)}

/* ══ TAB BAR ══ */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--header-bg);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--border);
  display:flex;padding:10px 0 22px;z-index:100;
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;
}
.tab-item.active{color:var(--accent)}
.tab-item span{font-size:21px;line-height:1}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-row">
      <div>
        <div class="header-title">🏠 Home Setup Board</div>
        <div class="header-sub">Astra Tower · Salt Lake City · 2026</div>
      </div>
      <div class="header-right">
        <div class="time-badge" id="timeBadge"></div>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()"></button>
        <button class="btn-add-main" onclick="openCatModal()">＋ Комната</button>
      </div>
    </div>
    <div class="grand-total">
      <div>
        <div class="gt-label">Осталось купить</div>
        <div class="gt-sub" id="gtSub"></div>
      </div>
      <div class="gt-amount" id="gtAmount">$0.00</div>
    </div>
  </div>
</div>

<div class="filter-bar" id="filterBar">
  <div class="cat-chip active" onclick="setFilter('all',this)">📋 Все</div>
  <div class="cat-chip" onclick="setFilter('pending',this)">⏳ Купить</div>
  <div class="cat-chip" onclick="setFilter('done',this)">✅ Куплено</div>
</div>

<div id="mainView">
  <div class="main app-wrap">
    <div id="catsGrid"></div>
  </div>
</div>

<div id="summaryView" class="summary-view">
  <div class="sum-grid">
    <div class="sum-card" id="sumStats"></div>
    <div class="sum-card" id="sumCats"></div>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-item active" id="tab-main" onclick="switchTab('main')"><span>🏠</span>Комнаты</div>
  <div class="tab-item" id="tab-sum" onclick="switchTab('sum')"><span>💰</span>Бюджет</div>
</div>

<!-- CAT MODAL -->
<div class="modal-overlay" id="catModal" onclick="if(event.target===this)closeCatModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="catModalTitle">Новая комната</div>
    <div class="form-group">
      <div class="form-label">Название</div>
      <input class="form-input" id="catName" placeholder="Кухня, Спальня…">
    </div>
    <div class="form-group">
      <div class="form-label">Иконка</div>
      <div class="emoji-row" id="emojiPicker"></div>
    </div>
    <div class="form-group">
      <div class="form-label">Цвет</div>
      <div class="color-row" id="colorPicker">
        <div class="color-swatch selected" style="background:#5856D6" data-c="#5856D6" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#34C759" data-c="#34C759" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#FF9500" data-c="#FF9500" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#FF3B30" data-c="#FF3B30" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#5AC8FA" data-c="#5AC8FA" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#FFCC00" data-c="#FFCC00" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#FF2D55" data-c="#FF2D55" onclick="pickColor(this)"></div>
        <div class="color-swatch" style="background:#30B0C7" data-c="#30B0C7" onclick="pickColor(this)"></div>
      </div>
    </div>
    <button class="btn-create" onclick="saveCat()">Добавить</button>
  </div>
</div>

<!-- ITEM MODAL -->
<div class="modal-overlay" id="itemModal" onclick="if(event.target===this)closeItemModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="itemModalTitle">Добавить товар</div>
    <div class="form-group">
      <div class="form-label">Название</div>
      <input class="form-input" id="itemName" placeholder="Набор тарелок, кофемашина…">
    </div>
    <div class="form-group">
      <div class="form-label">Цена ($)</div>
      <input class="form-input" id="itemPrice" type="number" min="0" step="0.01" placeholder="0.00">
    </div>
    <div class="form-group">
      <div class="form-label">Ссылка (необязательно)</div>
      <input class="form-input" id="itemUrl" type="url" placeholder="https://amazon.com/dp/…" style="font-size:13px" oninput="previewUrl(this.value)">
      <div id="urlPreview">
        <div id="urlPreviewCard">
          <div id="urlPreviewImg">🔗</div>
          <div><div id="urlPreviewHost"></div><div id="urlPreviewShort"></div></div>
        </div>
      </div>
    </div>
    <div class="form-group">
      <div class="form-label">Заметка</div>
      <input class="form-input" id="itemNote" placeholder="Размер, цвет, количество…">
    </div>
    <button class="btn-create" id="itemSaveBtn" onclick="saveItem()">Добавить товар</button>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-card">
    <div style="font-size:32px;margin-bottom:9px">🗑</div>
    <h3 id="confirmTitle">Удалить?</h3>
    <p id="confirmText"></p>
    <div class="confirm-btns">
      <button class="conf-btn cancel" onclick="closeConfirm()">Отмена</button>
      <button class="conf-btn del" onclick="doConfirm()">Удалить</button>
    </div>
  </div>
</div>

<script>
// ══ THEME ══
function getAutoTheme(){const h=new Date().getHours();return(h>=21||h<7)?'dark':'light'}
function timeBadgeText(){const h=new Date().getHours();if(h>=21||h<7)return'🌙 Ночь';if(h<12)return'🌅 Утро';if(h<18)return'☀️ День';return'🌆 Вечер'}

let manualTheme=localStorage.getItem('hsb_theme')||null;

function applyTheme(t){
  document.body.classList.toggle('dark',t==='dark');
  document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';
}
function toggleTheme(){
  const cur=document.body.classList.contains('dark')?'dark':'light';
  manualTheme=cur==='dark'?'light':'dark';
  localStorage.setItem('hsb_theme',manualTheme);
  applyTheme(manualTheme);
}
function initTheme(){
  applyTheme(manualTheme||getAutoTheme());
  document.getElementById('timeBadge').textContent=timeBadgeText();
}
setInterval(()=>{
  if(!manualTheme){applyTheme(getAutoTheme());}
  document.getElementById('timeBadge').textContent=timeBadgeText();
},60000);
initTheme();

// ══ DATA ══
let D=JSON.parse(localStorage.getItem('hsb_data')||'null');
if(!D){
  D={cats:[
    {id:1,name:'Кухня',icon:'🍳',color:'#FF9500',items:[
      {id:1,name:'Набор тарелок (6 шт)',price:49.99,url:'https://www.target.com',note:'белые',done:false},
      {id:2,name:'Кастрюли и сковородки',price:89.00,url:'https://www.amazon.com',note:'набор 5 предметов',done:false},
      {id:3,name:'Кофемашина Nespresso',price:179.00,url:'https://www.amazon.com',note:'',done:false},
      {id:4,name:'Столовые приборы',price:34.99,url:'',note:'',done:true},
    ]},
    {id:2,name:'Спальня',icon:'🛏',color:'#5AC8FA',items:[
      {id:1,name:'Постельное бельё King',price:79.00,url:'https://www.target.com',note:'',done:false},
      {id:2,name:'Подушки (2 шт)',price:45.00,url:'',note:'',done:false},
    ]},
    {id:3,name:'Ванная',icon:'🛁',color:'#34C759',items:[
      {id:1,name:'Комплект полотенец',price:39.99,url:'',note:'',done:true},
      {id:2,name:'Органайзер в душ',price:24.00,url:'',note:'',done:false},
    ]},
    {id:4,name:'Уборка',icon:'🧹',color:'#5856D6',items:[
      {id:1,name:'Пылесос Dyson',price:299.00,url:'https://www.amazon.com',note:'',done:false},
      {id:2,name:'Средства для уборки',price:45.00,url:'',note:'стартовый набор',done:false},
    ]},
  ]};
  sv();
}
function sv(){localStorage.setItem('hsb_data',JSON.stringify(D))}
function nid(arr){return arr.length===0?1:Math.max(...arr.map(x=>x.id))+1}
function es(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fm(n){return'$'+Number(n||0).toFixed(2)}
function sUrl(url){try{const u=new URL(url);let p=u.pathname;if(p.length>16)p=p.slice(0,14)+'…';return u.hostname.replace('www.','')+p}catch{return url.slice(0,22)+'…'}}
function host(url){try{return new URL(url).hostname.replace('www.','')}catch{return url}}
function fav(url){try{return`https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`}catch{return''}}

// ══ EMOJI ══
let selColor='#5856D6',selEmoji='🍳',editCatId=null,addToCat=null,editItem=null,pendingDel=null,curFilter='all';
const EMOJIS=['🍳','🛏','🛁','🛋','🚪','🧺','🖥','🌿','🐱','💡','🪞','🧹','🛒','🔧','💼','📦','🎨','🏋','📚','🍷'];

function initEmoji(){
  document.getElementById('emojiPicker').innerHTML=EMOJIS.map(e=>
    `<div class="emoji-opt ${e===selEmoji?'selected':''}" onclick="pickEmoji(this,'${e}')">${e}</div>`
  ).join('');
}
function pickEmoji(el,e){document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selEmoji=e}
function pickColor(el){document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));el.classList.add('selected');selColor=el.dataset.c}

// ══ CAT MODAL ══
function openCatModal(eid=null){
  editCatId=eid;selEmoji='🍳';selColor='#5856D6';
  document.getElementById('catName').value='';
  if(eid!=null){
    const c=D.cats.find(x=>x.id===eid);
    document.getElementById('catName').value=c.name;
    selEmoji=c.icon;selColor=c.color;
    document.getElementById('catModalTitle').textContent='✏️ Редактировать';
  } else document.getElementById('catModalTitle').textContent='Новая комната';
  initEmoji();
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.toggle('selected',s.dataset.c===selColor));
  document.getElementById('catModal').classList.add('open');
  setTimeout(()=>document.getElementById('catName').focus(),380);
}
function closeCatModal(){document.getElementById('catModal').classList.remove('open')}
function saveCat(){
  const name=document.getElementById('catName').value.trim();
  if(!name){document.getElementById('catName').focus();return}
  if(editCatId!=null){const c=D.cats.find(x=>x.id===editCatId);c.name=name;c.icon=selEmoji;c.color=selColor}
  else D.cats.push({id:nid(D.cats),name,icon:selEmoji,color:selColor,items:[]});
  sv();closeCatModal();render();
}

// ══ ITEM MODAL ══
function openItemModal(cid){
  addToCat=cid;editItem=null;
  ['itemName','itemUrl','itemNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('itemPrice').value='';
  document.getElementById('urlPreview').style.display='none';
  document.getElementById('itemModalTitle').textContent='Добавить товар';
  document.getElementById('itemSaveBtn').textContent='Добавить товар';
  document.getElementById('itemModal').classList.add('open');
  setTimeout(()=>document.getElementById('itemName').focus(),380);
}
function openEditItem(cid,iid){
  const cat=D.cats.find(x=>x.id===cid);
  const item=cat.items.find(i=>i.id===iid);
  editItem={cid,iid};addToCat=cid;
  document.getElementById('itemName').value=item.name;
  document.getElementById('itemPrice').value=item.price||'';
  document.getElementById('itemUrl').value=item.url||'';
  document.getElementById('itemNote').value=item.note||'';
  document.getElementById('itemModalTitle').textContent='✏️ Редактировать товар';
  document.getElementById('itemSaveBtn').textContent='Сохранить';
  previewUrl(item.url||'');
  document.getElementById('itemModal').classList.add('open');
  setTimeout(()=>document.getElementById('itemName').focus(),380);
}
function closeItemModal(){document.getElementById('itemModal').classList.remove('open')}

function previewUrl(val){
  const el=document.getElementById('urlPreview');
  if(!val||val.length<8){el.style.display='none';return}
  try{
    new URL(val);el.style.display='block';
    document.getElementById('urlPreviewHost').textContent=host(val);
    document.getElementById('urlPreviewShort').textContent=sUrl(val);
    const f=fav(val);
    document.getElementById('urlPreviewImg').innerHTML=f?`<img src="${f}" style="width:100%;height:100%;object-fit:contain;border-radius:4px" onerror="this.parentElement.innerHTML='🔗'">`:'🔗';
  }catch{el.style.display='none'}
}

function saveItem(){
  const name=document.getElementById('itemName').value.trim();
  if(!name){document.getElementById('itemName').focus();return}
  const price=parseFloat(document.getElementById('itemPrice').value)||0;
  const url=document.getElementById('itemUrl').value.trim();
  const note=document.getElementById('itemNote').value.trim();
  if(editItem){
    const cat=D.cats.find(x=>x.id===editItem.cid);
    const item=cat.items.find(i=>i.id===editItem.iid);
    item.name=name;item.price=price;item.url=url;item.note=note;
    const c=editItem.cid;sv();closeItemModal();render();setTimeout(()=>openCb(c),40);
  } else {
    D.cats.find(x=>x.id===addToCat).items.push({id:nid(D.cats.find(x=>x.id===addToCat).items),name,price,url,note,done:false});
    const c=addToCat;sv();closeItemModal();render();setTimeout(()=>openCb(c),40);
  }
}
function openCb(id){
  const b=document.getElementById('cb-'+id),ch=document.getElementById('ch-'+id);
  if(b)b.classList.add('open');if(ch)ch.classList.add('open');
}

// ══ TOGGLE ══
function toggleCat(id){
  const b=document.getElementById('cb-'+id),ch=document.getElementById('ch-'+id);
  if(b){b.classList.toggle('open');ch.classList.toggle('open')}
}
function toggleItem(cid,iid){
  D.cats.find(x=>x.id===cid).items.find(i=>i.id===iid).done^=true;
  sv();render();setTimeout(()=>openCb(cid),25);
}

// ══ DELETE ══
function askDelCat(id){
  const c=D.cats.find(x=>x.id===id);
  document.getElementById('confirmTitle').textContent='Удалить категорию?';
  document.getElementById('confirmText').textContent=`«${c.name}» и все товары будут удалены.`;
  pendingDel=()=>{D.cats=D.cats.filter(x=>x.id!==id);sv();render()};
  document.getElementById('confirmOverlay').classList.add('open');
}
function askDelItem(cid,iid){
  const item=D.cats.find(x=>x.id===cid).items.find(i=>i.id===iid);
  document.getElementById('confirmTitle').textContent='Удалить товар?';
  document.getElementById('confirmText').textContent=`«${item.name}»`;
  pendingDel=()=>{
    D.cats.find(x=>x.id===cid).items=D.cats.find(x=>x.id===cid).items.filter(i=>i.id!==iid);
    sv();render();setTimeout(()=>openCb(cid),25);
  };
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');pendingDel=null}
function doConfirm(){if(pendingDel){pendingDel();closeConfirm()}}

// ══ FILTER / TAB ══
function setFilter(f,el){
  curFilter=f;
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');render();
}
function switchTab(t){
  document.getElementById('mainView').style.display=t==='main'?'block':'none';
  document.getElementById('summaryView').classList.toggle('active',t==='sum');
  document.getElementById('filterBar').style.display=t==='main'?'flex':'none';
  document.getElementById('tab-main').classList.toggle('active',t==='main');
  document.getElementById('tab-sum').classList.toggle('active',t==='sum');
}

// ══ RENDER ══
function render(){
  let tA=0,dA=0,iA=0,iD=0;
  D.cats.forEach(c=>c.items.forEach(i=>{tA+=i.price||0;if(i.done)dA+=i.price||0;iA++;if(i.done)iD++}));
  document.getElementById('gtAmount').textContent=fm(tA-dA);
  document.getElementById('gtSub').textContent=`${iD} из ${iA} куплено · потрачено ${fm(dA)}`;

  const grid=document.getElementById('catsGrid');
  if(!D.cats.length){
    grid.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1"><div style="font-size:46px;margin-bottom:12px">🏠</div><div style="font-size:16px;font-weight:600;color:var(--text2);margin-bottom:6px">Нет категорий</div><div style="font-size:13px">Нажмите «+ Комната»</div></div>`;
    renderSum(tA,dA,iA,iD);return;
  }

  grid.innerHTML=D.cats.map(cat=>{
    let items=cat.items;
    if(curFilter==='pending')items=items.filter(i=>!i.done);
    else if(curFilter==='done')items=items.filter(i=>i.done);
    const cT=cat.items.reduce((s,i)=>s+(i.price||0),0);
    const cD=cat.items.filter(i=>i.done).reduce((s,i)=>s+(i.price||0),0);
    const cR=cT-cD;
    const pct=cat.items.length?Math.round(cat.items.filter(i=>i.done).length/cat.items.length*100):0;

    const iHtml=items.map(item=>{
      const f=item.url?fav(item.url):'';
      const thumb=item.url
        ?`<div class="item-thumb" onclick="window.open('${es(item.url)}','_blank')">${f?`<img src="${f}" onerror="this.parentElement.innerHTML='🔗'">`:'🔗'}</div>`
        :`<div class="item-thumb">📦</div>`;
      const link=item.url?`<a href="${es(item.url)}" target="_blank" class="item-link-badge">🔗 ${es(sUrl(item.url))}</a>`:'';
      const note=item.note?`<span style="font-size:11px;color:var(--text3);font-style:italic">${es(item.note)}</span>`:'';
      return `
      <div class="item-row">
        <div class="item-check ${item.done?'done':''}" onclick="toggleItem(${cat.id},${item.id})"></div>
        <div class="item-main">
          <div class="item-name ${item.done?'done':''}">${es(item.name)}</div>
          ${(item.url||item.note)?`<div class="item-link-row">${link}${note}</div>`:''}
        </div>
        ${thumb}
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
          <div class="item-price ${item.done?'done':''}">${item.price?fm(item.price):''}</div>
          <div class="item-actions">
            <button class="item-action-btn" onclick="openEditItem(${cat.id},${item.id})" title="Редактировать">✏️</button>
            <button class="item-action-btn del" onclick="askDelItem(${cat.id},${item.id})">🗑</button>
          </div>
        </div>
      </div>`;
    }).join('');

    return `
    <div class="cat-card">
      <div class="cat-header" onclick="toggleCat(${cat.id})">
        <div class="cat-icon" style="background:${cat.color}15;border:1px solid ${cat.color}35">${cat.icon}</div>
        <div class="cat-info">
          <div class="cat-name">${es(cat.name)}</div>
          <div class="cat-meta">${cat.items.length} товаров · ${pct}% куплено</div>
        </div>
        <div class="cat-total" style="color:${cR>0?cat.color:'var(--green)'}">${cR>0?fm(cR):'✓'}</div>
        <div class="cat-chevron" id="ch-${cat.id}">›</div>
      </div>
      ${cat.items.length?`<div class="cat-progress"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${cat.color}"></div></div><div class="prog-label">${fm(cD)} из ${fm(cT)}</div></div>`:''}
      <div class="cat-body" id="cb-${cat.id}">
        ${items.length===0&&!cat.items.length?'<div class="empty-cat">Нет товаров ↓</div>':items.length===0?'<div class="empty-cat">Нет товаров по фильтру</div>':iHtml}
        <div class="cat-actions">
          <button class="cat-act-btn" onclick="openItemModal(${cat.id})"><span>＋</span>Товар</button>
          <button class="cat-act-btn" onclick="openCatModal(${cat.id})"><span>✏️</span>Изменить</button>
          <button class="cat-act-btn danger" onclick="askDelCat(${cat.id})"><span>🗑</span>Удалить</button>
        </div>
      </div>
    </div>`;
  }).join('');

  renderSum(tA,dA,iA,iD);
}

function renderSum(tA,dA,iA,iD){
  document.getElementById('sumStats').innerHTML=`
    <h3>💰 Сводка</h3>
    <div class="sum-row"><span class="sum-label">Всего</span><span class="sum-val">${fm(tA)}</span></div>
    <div class="sum-row"><span class="sum-label">✅ Потрачено</span><span class="sum-val g">${fm(dA)}</span></div>
    <div class="sum-row"><span class="sum-label">⏳ Осталось</span><span class="sum-val a">${fm(tA-dA)}</span></div>
    <div class="sum-row"><span class="sum-label">Куплено</span><span class="sum-val">${iD} / ${iA}</span></div>`;
  document.getElementById('sumCats').innerHTML=`
    <h3>📋 По комнатам</h3>
    ${D.cats.map(c=>{
      const t=c.items.reduce((s,i)=>s+(i.price||0),0);
      const d=c.items.filter(i=>i.done).reduce((s,i)=>s+(i.price||0),0);
      return`<div class="sum-row"><span class="sum-label">${c.icon} ${es(c.name)}</span><span class="sum-val">${fm(t-d)} <span style="color:var(--text3);font-size:11px;font-weight:400">/ ${fm(t)}</span></span></div>`;
    }).join('')}`;
}

render();
</script>
</body>
</html>
