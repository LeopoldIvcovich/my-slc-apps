<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Home Setup Board · SLC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;min-height:100vh;padding-bottom:100px;background:var(--bg);color:var(--text1);transition:background .3s,color .3s}
body,body *{transition:background-color .3s,border-color .3s,color .3s}
:root{
  --bg:#F5F5F7;--surface:#FFFFFF;--surface2:#F2F2F4;--surface3:#E8E8EC;
  --border:#E0E0E6;--border2:#C8C8CE;--accent:#5856D6;--accent2:#7B79E8;--accent-bg:rgba(88,86,214,.07);
  --green:#34C759;--red:#FF3B30;--orange:#FF9500;--yellow:#FFCC00;
  --text1:#1C1C1E;--text2:#48484A;--text3:#8E8E93;--header-bg:rgba(245,245,247,.92);
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.05);--shadow-lg:0 20px 50px rgba(0,0,0,.13);
  --r:14px;--r-sm:10px;--r-xs:8px;
}
body.dark{
  --bg:#0F0F12;--surface:#1C1C1E;--surface2:#2C2C2E;--surface3:#3A3A3C;
  --border:#38383A;--border2:#48484A;--accent:#7B79E8;--accent2:#A09EFF;--accent-bg:rgba(123,121,232,.13);
  --green:#30D158;--red:#FF453A;--orange:#FF9F0A;--yellow:#FFD60A;
  --text1:#F2F2F7;--text2:#AEAEB2;--text3:#636366;--header-bg:rgba(15,15,18,.93);
  --shadow:0 1px 3px rgba(0,0,0,.25),0 4px 14px rgba(0,0,0,.18);--shadow-lg:0 20px 50px rgba(0,0,0,.5);
}
.app-wrap{max-width:1060px;margin:0 auto}
.header{background:var(--header-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);padding:15px 20px 13px}
.header-inner{max-width:1060px;margin:0 auto}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px;gap:10px}
.header-title{font-size:23px;font-weight:700;letter-spacing:-.4px;color:var(--text1)}
.header-sub{font-size:11px;color:var(--text3);margin-top:2px;font-weight:400}
.header-right{display:flex;align-items:center;gap:7px;flex-shrink:0}

/* SYNC */
.sync-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:4px 10px;white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s;flex-shrink:0}
.sync-dot.connected{background:var(--green)}
.sync-dot.syncing{background:var(--orange);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

.theme-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.theme-btn:active{transform:scale(.88)}
.btn-add-main{background:var(--accent);color:#fff;border:none;border-radius:50px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit;white-space:nowrap;box-shadow:0 3px 10px rgba(88,86,214,.3)}
.btn-add-main:active{transform:scale(.95);opacity:.85}
.grand-total{background:linear-gradient(135deg,var(--accent) 0%,#3D3BB8 100%);border-radius:var(--r-sm);padding:11px 15px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 5px 18px rgba(88,86,214,.25)}
.gt-label{font-size:10px;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.7px;color:#fff}
.gt-amount{font-size:21px;font-weight:700;letter-spacing:-.4px;color:#fff}
.gt-sub{font-size:11px;opacity:.7;margin-top:1px;color:#fff}
.filter-bar{display:flex;gap:7px;padding:12px 20px 0;overflow-x:auto;scrollbar-width:none;max-width:1060px;margin:0 auto}
.filter-bar::-webkit-scrollbar{display:none}
.cat-chip{background:var(--surface);border:1.5px solid var(--border);border-radius:50px;padding:6px 13px;white-space:nowrap;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;gap:4px}
.cat-chip.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.cat-chip:active{transform:scale(.94)}
.main{padding:14px 20px}
#catsGrid{display:grid;grid-template-columns:1fr;gap:12px;align-items:start}
@media(min-width:680px){#catsGrid{grid-template-columns:repeat(2,1fr)}}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.cat-header{display:flex;align-items:center;gap:11px;padding:13px 15px;cursor:pointer}
.cat-header:active{background:var(--surface2)}
.cat-icon{width:36px;height:36px;border-radius:var(--r-xs);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:15px;font-weight:600;color:var(--text1)}
.cat-meta{font-size:11px;color:var(--text3);margin-top:1px}
.cat-total{font-size:15px;font-weight:700;flex-shrink:0;letter-spacing:-.2px}
.cat-chevron{color:var(--text3);font-size:14px;margin-left:2px;transition:transform .2s;flex-shrink:0}
.cat-chevron.open{transform:rotate(90deg)}
.cat-progress{padding:0 15px 1px}
.prog-bar{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease}
.prog-label{font-size:11px;color:var(--text3);margin-top:3px;padding-bottom:7px}
.cat-body{display:none}
.cat-body.open{display:block}
.item-row{display:flex;align-items:flex-start;gap:9px;padding:10px 15px;border-top:1px solid var(--border)}
.item-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;margin-top:1px}
.item-check.done{background:var(--green);border-color:var(--green)}
.item-check.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.item-main{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;color:var(--text1);line-height:1.35}
.item-name.done{text-decoration:line-through;color:var(--text3)}
.item-link-row{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.item-link-badge{display:inline-flex;align-items:center;gap:3px;background:var(--accent-bg);border:1px solid rgba(88,86,214,.18);border-radius:50px;padding:2px 8px;font-size:11px;color:var(--accent);text-decoration:none;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-thumb{width:42px;height:42px;border-radius:var(--r-xs);border:1px solid var(--border);flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;overflow:hidden}
.item-thumb img{width:26px;height:26px;object-fit:contain}
.item-price{font-size:13px;font-weight:700;color:var(--text1);white-space:nowrap;letter-spacing:-.2px}
.item-price.done{color:var(--text3);font-weight:400}
.item-actions{display:flex;gap:1px;margin-top:2px}
.item-action-btn{width:26px;height:26px;background:none;border:none;border-radius:var(--r-xs);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.item-action-btn:hover{background:var(--surface3);color:var(--text1)}
.item-action-btn.del:hover{color:var(--red)}
.cat-actions{display:flex;border-top:1px solid var(--border)}
.cat-act-btn{flex:1;padding:9px 4px;background:none;border:none;cursor:pointer;font-size:11px;font-weight:500;color:var(--accent);display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit}
.cat-act-btn:not(:last-child){border-right:1px solid var(--border)}
.cat-act-btn:active{background:var(--surface2)}
.cat-act-btn span{font-size:14px}
.cat-act-btn.danger{color:var(--red)}
.empty-cat{padding:18px 15px;text-align:center;font-size:13px;color:var(--text3)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
body.dark .modal-overlay{background:rgba(0,0,0,.6)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:18px 22px 48px;transform:translateY(100%);transition:transform .32s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 17px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:17px;text-align:center;color:var(--text1)}
.form-group{margin-bottom:11px}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.form-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px 13px;font-size:15px;color:var(--text1);outline:none;font-family:inherit}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
.emoji-row{display:flex;flex-wrap:wrap;gap:6px}
.emoji-opt{width:37px;height:37px;border-radius:var(--r-xs);background:var(--surface2);border:1.5px solid var(--border);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.emoji-opt.selected{border-color:var(--accent);background:var(--accent-bg)}
.color-row{display:flex;gap:9px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent}
.color-swatch.selected{border-color:var(--text1);transform:scale(1.22)}
.btn-create{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:15px;font-family:inherit;box-shadow:0 4px 12px rgba(88,86,214,.22)}
.btn-create:active{transform:scale(.98);opacity:.85}
#urlPreview{margin-top:7px;display:none}
#urlPreviewCard{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-xs);padding:9px 12px;display:flex;align-items:center;gap:9px}
#urlPreviewImg{width:34px;height:34px;border-radius:6px;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;overflow:hidden}
#urlPreviewHost{font-size:12px;font-weight:600;color:var(--text1)}
#urlPreviewShort{font-size:11px;color:var(--accent);margin-top:1px}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.confirm-overlay.open{opacity:1;pointer-events:all}
.confirm-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;max-width:270px;width:100%;text-align:center;transform:scale(.87);transition:transform .22s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--shadow-lg)}
.confirm-overlay.open .confirm-card{transform:scale(1)}
.confirm-card h3{font-size:16px;font-weight:700;margin-bottom:7px;color:var(--text1)}
.confirm-card p{font-size:13px;color:var(--text3);margin-bottom:17px;line-height:1.5}
.confirm-btns{display:flex;gap:9px}
.conf-btn{flex:1;padding:11px;border:none;border-radius:var(--r-xs);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.conf-btn.cancel{background:var(--surface3);color:var(--text2)}
.conf-btn.del{background:var(--red);color:#fff}
.sum-view{padding:14px 20px;display:none;max-width:1060px;margin:0 auto}
.sum-view.active{display:block}
.sum-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:680px){.sum-grid{grid-template-columns:1fr 1fr}}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;box-shadow:var(--shadow)}
.sum-card h3{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:11px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.sum-row:last-child{border-bottom:none}
.sum-label{font-size:13px;color:var(--text2)}
.sum-val{font-size:13px;font-weight:700;color:var(--text1)}
.sum-val.g{color:var(--green)}
.sum-val.a{color:var(--accent)}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--header-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-top:1px solid var(--border);display:flex;padding:10px 0 22px;z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500}
.tab-item.active{color:var(--accent)}
.tab-item span{font-size:21px;line-height:1}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-row">
      <div>
        <div class="header-title">🏠 Home Setup Board</div>
        <div class="header-sub">Astra Tower · Salt Lake City · 2026</div>
      </div>
      <div class="header-right">
        <div class="sync-pill"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">connecting…</span></div>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()"></button>
        <button class="btn-add-main" onclick="openCatModal()">＋ Room</button>
      </div>
    </div>
    <div class="grand-total">
      <div><div class="gt-label">Remaining to buy</div><div class="gt-sub" id="gtSub"></div></div>
      <div class="gt-amount" id="gtAmount">$0.00</div>
    </div>
  </div>
</div>
<div class="filter-bar" id="filterBar">
  <div class="cat-chip active" onclick="setFilter('all',this)">📋 All</div>
  <div class="cat-chip" onclick="setFilter('pending',this)">⏳ To buy</div>
  <div class="cat-chip" onclick="setFilter('done',this)">✅ Bought</div>
</div>
<div id="mainView"><div class="main app-wrap"><div id="catsGrid"></div></div></div>
<div id="sumView" class="sum-view">
  <div class="sum-grid">
    <div class="sum-card" id="sumStats"></div>
    <div class="sum-card" id="sumCats"></div>
  </div>
</div>
<div class="tab-bar">
  <div class="tab-item active" id="tab-main" onclick="switchTab('main')"><span>🏠</span>Rooms</div>
  <div class="tab-item" id="tab-sum" onclick="switchTab('sum')"><span>💰</span>Budget</div>
</div>
<!-- CAT MODAL -->
<div class="modal-overlay" id="catModal" onclick="if(event.target===this)closeCatModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="catModalTitle">New Room</div>
    <div class="form-group"><div class="form-label">Name</div><input class="form-input" id="catName" placeholder="Kitchen, Bedroom…"></div>
    <div class="form-group"><div class="form-label">Icon</div><div class="emoji-row" id="emojiPicker"></div></div>
    <div class="form-group"><div class="form-label">Color</div><div class="color-row" id="colorPicker">
      <div class="color-swatch selected" style="background:#5856D6" data-c="#5856D6" onclick="pickColor(this)"></div>
      <div class="color-swatch" style="background:#34C759" data-c="#34C759" onclick="pickColor(this)"></div>
      <div class="color-swatch" style="background:#FF9500" data-c="#FF9500" onclick="pickColor(this)"></div>
      <div class="color-swatch" style="background:#FF3B30" data-c="#FF3B30" onclick="pickColor(this)"></div>
      <div class="color-swatch" style="background:#5AC8FA" data-c="#5AC8FA" onclick="pickColor(this)"></div>
      <div class="color-swatch" style="background:#FFCC00" data-c="#FFCC00" onclick="pickColor(this)"></div>
      <div class="color-swatch" style="background:#FF2D55" data-c="#FF2D55" onclick="pickColor(this)"></div>
      <div class="color-swatch" style="background:#30B0C7" data-c="#30B0C7" onclick="pickColor(this)"></div>
    </div></div>
    <button class="btn-create" onclick="saveCat()">Add Room</button>
  </div>
</div>
<!-- ITEM MODAL -->
<div class="modal-overlay" id="itemModal" onclick="if(event.target===this)closeItemModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="itemModalTitle">Add Item</div>
    <div class="form-group"><div class="form-label">Product URL</div>
      <input class="form-input" id="fUrl" type="url" placeholder="https://amazon.com/…" style="font-size:13px" oninput="previewUrl(this.value)">
      <div id="urlPreview"><div id="urlPreviewCard"><div id="urlPreviewImg">🔗</div><div><div id="urlPreviewHost"></div><div id="urlPreviewShort"></div></div></div></div>
    </div>
    <div class="form-group"><div class="form-label">Name</div><input class="form-input" id="fName" placeholder="IKEA DINERA plates…"></div>
    <div class="form-group"><div class="form-label">Price ($)</div><input class="form-input" id="fPrice" type="number" min="0" step="0.01" placeholder="0.00" style="font-family:monospace"></div>
    <div class="form-group"><div class="form-label">Note</div><input class="form-input" id="fNote" placeholder="Size, color, quantity…"></div>
    <button class="btn-create" id="itemSaveBtn" onclick="saveItem()">Add Item</button>
  </div>
</div>
<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-card">
    <div style="font-size:32px;margin-bottom:9px">🗑</div>
    <h3 id="confirmTitle">Delete?</h3><p id="confirmText"></p>
    <div class="confirm-btns">
      <button class="conf-btn cancel" onclick="closeConfirm()">Cancel</button>
      <button class="conf-btn del" onclick="doConfirm()">Delete</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAsWiJNuQurGLBT4POmTqWTL_wa2BbGZps",
  authDomain: "calculator-sell.firebaseapp.com",
  databaseURL: "https://calculator-sell-default-rtdb.firebaseio.com",
  projectId: "calculator-sell",
  storageBucket: "calculator-sell.firebasestorage.app",
  messagingSenderId: "938081014350",
  appId: "1:938081014350:web:373e769be65db80778e91f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const catsRef = ref(db, 'board/cats');
const itemsRef = ref(db, 'board/items');

let cats = [], items = [], curFilter = 'all';
let selColor = '#5856D6', selEmoji = '🍳', editCatId = null, addToCatId = null, editItemId = null, pendingDel = null;
const EMOJIS = ['🍳','🛏','🛁','🛋','🚪','🧺','🖥','🌿','🐱','💡','🪞','🧹','🛒','🔧','💼','📦','🎨','📚','🍷','🏋'];

// ── THEME ──
let manualTheme = localStorage.getItem('hsb_theme') || null;
function getAutoTheme(){const h=new Date().getHours();return(h>=21||h<7)?'dark':'light'}
function applyTheme(t){document.body.classList.toggle('dark',t==='dark');document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙'}
window.toggleTheme = function(){const c=document.body.classList.contains('dark')?'dark':'light';manualTheme=c==='dark'?'light':'dark';localStorage.setItem('hsb_theme',manualTheme);applyTheme(manualTheme)};
applyTheme(manualTheme||getAutoTheme());
setInterval(()=>{if(!manualTheme)applyTheme(getAutoTheme())},60000);

// ── SYNC STATUS ──
function setSyncStatus(state){
  const dot=document.getElementById('syncDot'), label=document.getElementById('syncLabel');
  if(state==='connected'){dot.className='sync-dot connected';label.textContent='synced'}
  else if(state==='syncing'){dot.className='sync-dot syncing';label.textContent='saving…'}
  else{dot.className='sync-dot';label.textContent='offline'}
}

// ── LISTEN ──
onValue(catsRef, snap => { cats = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({fbKey:k,...v})) : []; setSyncStatus('connected'); render(); });
onValue(itemsRef, snap => { items = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({fbKey:k,...v})) : []; render(); });

// ── HELPERS ──
function fm(n){return '$'+Number(n||0).toFixed(2)}
function es(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function host(url){try{return new URL(url).hostname.replace('www.','')}catch{return''}}
function sUrl(url){try{const u=new URL(url);let p=u.pathname;if(p.length>14)p=p.slice(0,12)+'…';return u.hostname.replace('www.','')+p}catch{return url.slice(0,20)+'…'}}
function favUrl(url){try{return`https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`}catch{return''}}

window.previewUrl = function(val){
  const el=document.getElementById('urlPreview');
  if(!val||val.length<8){el.style.display='none';return}
  try{new URL(val);el.style.display='block';
    document.getElementById('urlPreviewHost').textContent=host(val);
    document.getElementById('urlPreviewShort').textContent=sUrl(val);
    const fav=favUrl(val);
    document.getElementById('urlPreviewImg').innerHTML=fav?`<img src="${fav}" style="width:100%;height:100%;object-fit:contain;border-radius:4px" onerror="this.parentElement.innerHTML='🔗'">`:'🔗';
  }catch{el.style.display='none'}
};

// ── CAT MODAL ──
function initEmoji(){
  document.getElementById('emojiPicker').innerHTML=EMOJIS.map(e=>`<div class="emoji-opt ${e===selEmoji?'selected':''}" onclick="pickEmoji(this,'${e}')">${e}</div>`).join('');
}
window.pickEmoji=(el,e)=>{document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selEmoji=e};
window.pickColor=(el)=>{document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));el.classList.add('selected');selColor=el.dataset.c};

window.openCatModal = function(fbKey=null){
  editCatId=fbKey; selEmoji='🍳'; selColor='#5856D6';
  document.getElementById('catName').value='';
  if(fbKey){const c=cats.find(x=>x.fbKey===fbKey);document.getElementById('catName').value=c.name;selEmoji=c.icon;selColor=c.color;document.getElementById('catModalTitle').textContent='✏️ Edit Room';}
  else document.getElementById('catModalTitle').textContent='New Room';
  initEmoji();
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.toggle('selected',s.dataset.c===selColor));
  document.getElementById('catModal').classList.add('open');
  setTimeout(()=>document.getElementById('catName').focus(),380);
};
window.closeCatModal=()=>document.getElementById('catModal').classList.remove('open');
window.saveCat = function(){
  const name=document.getElementById('catName').value.trim();
  if(!name){document.getElementById('catName').focus();return}
  setSyncStatus('syncing');
  if(editCatId){update(ref(db,'board/cats/'+editCatId),{name,icon:selEmoji,color:selColor});}
  else push(catsRef,{name,icon:selEmoji,color:selColor,createdAt:Date.now()});
  window.closeCatModal();
};

// ── ITEM MODAL ──
window.openItemModal = function(catFbKey){
  addToCatId=catFbKey; editItemId=null;
  ['fUrl','fName','fPrice','fNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('urlPreview').style.display='none';
  document.getElementById('itemModalTitle').textContent='Add Item';
  document.getElementById('itemSaveBtn').textContent='Add Item';
  document.getElementById('itemModal').classList.add('open');
  setTimeout(()=>document.getElementById('fUrl').focus(),380);
};
window.openEditItemModal = function(fbKey){
  const item=items.find(x=>x.fbKey===fbKey);
  editItemId=fbKey; addToCatId=item.catFbKey;
  document.getElementById('fUrl').value=item.url||'';
  document.getElementById('fName').value=item.name||'';
  document.getElementById('fPrice').value=item.price||'';
  document.getElementById('fNote').value=item.note||'';
  document.getElementById('itemModalTitle').textContent='✏️ Edit Item';
  document.getElementById('itemSaveBtn').textContent='Save';
  window.previewUrl(item.url||'');
  document.getElementById('itemModal').classList.add('open');
};
window.closeItemModal=()=>document.getElementById('itemModal').classList.remove('open');
window.saveItem = function(){
  const name=document.getElementById('fName').value.trim();
  if(!name){document.getElementById('fName').focus();return}
  const price=parseFloat(document.getElementById('fPrice').value)||0;
  const url=document.getElementById('fUrl').value.trim();
  const note=document.getElementById('fNote').value.trim();
  setSyncStatus('syncing');
  if(editItemId){update(ref(db,'board/items/'+editItemId),{name,price,url,note});}
  else push(itemsRef,{name,price,url,note,catFbKey:addToCatId,done:false,createdAt:Date.now()});
  window.closeItemModal();
};

// ── TOGGLE ITEM ──
window.toggleItem = function(fbKey, done){
  setSyncStatus('syncing');
  update(ref(db,'board/items/'+fbKey),{done:!done});
};

// ── DELETE ──
window.askDelCat = function(fbKey){
  const c=cats.find(x=>x.fbKey===fbKey);
  document.getElementById('confirmTitle').textContent='Delete room?';
  document.getElementById('confirmText').textContent=`«${c.name}» and all its items will be deleted.`;
  pendingDel=()=>{
    setSyncStatus('syncing');
    remove(ref(db,'board/cats/'+fbKey));
    items.filter(i=>i.catFbKey===fbKey).forEach(i=>remove(ref(db,'board/items/'+i.fbKey)));
  };
  document.getElementById('confirmOverlay').classList.add('open');
};
window.askDelItem = function(fbKey){
  const item=items.find(x=>x.fbKey===fbKey);
  document.getElementById('confirmTitle').textContent='Delete item?';
  document.getElementById('confirmText').textContent=`«${item.name}»`;
  pendingDel=()=>{setSyncStatus('syncing');remove(ref(db,'board/items/'+fbKey));};
  document.getElementById('confirmOverlay').classList.add('open');
};
window.closeConfirm=()=>{document.getElementById('confirmOverlay').classList.remove('open');pendingDel=null};
window.doConfirm=()=>{if(pendingDel){pendingDel();window.closeConfirm()}};

window.setFilter = function(f,el){
  curFilter=f;
  document.querySelectorAll('#filterBar .cat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');render();
};
window.switchTab = function(t){
  document.getElementById('mainView').style.display=t==='main'?'block':'none';
  document.getElementById('sumView').classList.toggle('active',t==='sum');
  document.getElementById('filterBar').style.display=t==='main'?'flex':'none';
  document.getElementById('tab-main').classList.toggle('active',t==='main');
  document.getElementById('tab-sum').classList.toggle('active',t==='sum');
};
window.toggleCat = function(fbKey){
  const b=document.getElementById('cb-'+fbKey),ch=document.getElementById('ch-'+fbKey);
  if(b){b.classList.toggle('open');ch.classList.toggle('open')}
};

function render(){
  let totalAll=0,doneAll=0,iA=0,iD=0;
  cats.forEach(cat=>{
    const catItems=items.filter(i=>i.catFbKey===cat.fbKey);
    catItems.forEach(i=>{totalAll+=i.price||0;if(i.done)doneAll+=i.price||0;iA++;if(i.done)iD++;});
  });
  document.getElementById('gtAmount').textContent=fm(totalAll-doneAll);
  document.getElementById('gtSub').textContent=`${iD} of ${iA} bought · spent ${fm(doneAll)}`;

  const grid=document.getElementById('catsGrid');
  if(!cats.length){
    grid.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--text3);grid-column:1/-1"><div style="font-size:46px;margin-bottom:12px">🏠</div><div style="font-size:16px;font-weight:600;color:var(--text2);margin-bottom:6px">No rooms yet</div><div style="font-size:13px">Tap «+ Room» to start</div></div>`;
    renderSum(totalAll,doneAll,iA,iD);return;
  }

  grid.innerHTML=cats.map(cat=>{
    let catItems=items.filter(i=>i.catFbKey===cat.fbKey);
    let filtered=catItems;
    if(curFilter==='pending')filtered=catItems.filter(i=>!i.done);
    else if(curFilter==='done')filtered=catItems.filter(i=>i.done);
    const cT=catItems.reduce((s,i)=>s+(i.price||0),0);
    const cD=catItems.filter(i=>i.done).reduce((s,i)=>s+(i.price||0),0);
    const pct=catItems.length?Math.round(catItems.filter(i=>i.done).length/catItems.length*100):0;
    const iHtml=filtered.map(item=>{
      const fav=item.url?favUrl(item.url):'';
      const thumb=item.url?`<div class="item-thumb" onclick="window.open('${es(item.url)}','_blank')">${fav?`<img src="${fav}" onerror="this.parentElement.innerHTML='🔗'">`:'🔗'}</div>`:`<div class="item-thumb">📦</div>`;
      const link=item.url?`<a href="${es(item.url)}" target="_blank" class="item-link-badge">🔗 ${es(sUrl(item.url))}</a>`:'';
      const note=item.note?`<span style="font-size:11px;color:var(--text3);font-style:italic">${es(item.note)}</span>`:'';
      return`<div class="item-row">
        <div class="item-check ${item.done?'done':''}" onclick="toggleItem('${item.fbKey}',${item.done})"></div>
        <div class="item-main">
          <div class="item-name ${item.done?'done':''}">${es(item.name)}</div>
          ${(item.url||item.note)?`<div class="item-link-row">${link}${note}</div>`:''}
        </div>
        ${thumb}
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
          <div class="item-price ${item.done?'done':''}">${item.price?fm(item.price):''}</div>
          <div class="item-actions">
            <button class="item-action-btn" onclick="openEditItemModal('${item.fbKey}')">✏️</button>
            <button class="item-action-btn del" onclick="askDelItem('${item.fbKey}')">🗑</button>
          </div>
        </div>
      </div>`;
    }).join('');
    return`<div class="cat-card">
      <div class="cat-header" onclick="toggleCat('${cat.fbKey}')">
        <div class="cat-icon" style="background:${cat.color}15;border:1px solid ${cat.color}35">${cat.icon}</div>
        <div class="cat-info"><div class="cat-name">${es(cat.name)}</div><div class="cat-meta">${catItems.length} items · ${pct}% done</div></div>
        <div class="cat-total" style="color:${(cT-cD)>0?cat.color:'var(--green)'}">${(cT-cD)>0?fm(cT-cD):'✓'}</div>
        <div class="cat-chevron" id="ch-${cat.fbKey}">›</div>
      </div>
      ${catItems.length?`<div class="cat-progress"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${cat.color}"></div></div><div class="prog-label">${fm(cD)} of ${fm(cT)}</div></div>`:''}
      <div class="cat-body" id="cb-${cat.fbKey}">
        ${filtered.length===0&&!catItems.length?'<div class="empty-cat">No items yet ↓</div>':filtered.length===0?'<div class="empty-cat">No items match filter</div>':iHtml}
        <div class="cat-actions">
          <button class="cat-act-btn" onclick="openItemModal('${cat.fbKey}')"><span>＋</span>Item</button>
          <button class="cat-act-btn" onclick="openCatModal('${cat.fbKey}')"><span>✏️</span>Edit</button>
          <button class="cat-act-btn danger" onclick="askDelCat('${cat.fbKey}')"><span>🗑</span>Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
  renderSum(totalAll,doneAll,iA,iD);
}

function renderSum(tA,dA,iA,iD){
  document.getElementById('sumStats').innerHTML=`<h3>💰 Budget</h3>
    <div class="sum-row"><span class="sum-label">Total</span><span class="sum-val">${fm(tA)}</span></div>
    <div class="sum-row"><span class="sum-label">✅ Spent</span><span class="sum-val g">${fm(dA)}</span></div>
    <div class="sum-row"><span class="sum-label">⏳ Remaining</span><span class="sum-val a">${fm(tA-dA)}</span></div>
    <div class="sum-row"><span class="sum-label">Items bought</span><span class="sum-val">${iD} / ${iA}</span></div>`;
  document.getElementById('sumCats').innerHTML=`<h3>📋 By Room</h3>${cats.map(c=>{
    const ci=items.filter(i=>i.catFbKey===c.fbKey);
    const t=ci.reduce((s,i)=>s+(i.price||0),0);
    const d=ci.filter(i=>i.done).reduce((s,i)=>s+(i.price||0),0);
    return`<div class="sum-row"><span class="sum-label">${c.icon} ${es(c.name)}</span><span class="sum-val">${fm(t-d)} <span style="color:var(--text3);font-size:11px;font-weight:400">/ ${fm(t)}</span></span></div>`;
  }).join('')}`;
}
</script>
</body>
</html>
